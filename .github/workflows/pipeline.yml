name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t backend:latest ./backend
          docker build -t frontend:latest ./frontend

      - name: Login to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push images
        run: |
          docker tag backend:latest ghcr.io/chatable/backend:latest
          docker tag frontend:latest ghcr.io/chatable/frontend:latest
          docker push ghcr.io/chatable/backend:latest
          docker push ghcr.io/chatable/frontend:latest

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_HOST }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            export REPO=${{ github.repository }}
            export CLUSTER_IP=${{ secrets.CLUSTER_IP }}
            cd /opt/app
            docker-compose pull       # pull the latest images
            docker-compose down       # stop old containers
            docker-compose up -d      # start new containers