name: CI/CD Pipeline

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main

env:
  IMAGE_BASE: ghcr.io/nadav111/chatable  # base for image tags

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production   # needed if using environment secrets
    outputs:
      backend_image: ${{ steps.backend.outputs.tag }}
      frontend_image: ${{ steps.frontend.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        id: backend
        run: |
          docker build -t backend:latest ./backend
          echo "tag=${IMAGE_BASE}/backend:latest" >> $GITHUB_OUTPUT

      - name: Build frontend image
        id: frontend
        run: |
          docker build -t frontend:latest ./frontend
          echo "tag=${IMAGE_BASE}/frontend:latest" >> $GITHUB_OUTPUT

  push:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push backend image
        run: |
          docker tag backend:latest ${{ env.IMAGE_BASE }}/backend:latest
          docker push ${{ env.IMAGE_BASE }}/backend:latest

      - name: Push frontend image
        run: |
          docker tag frontend:latest ${{ env.IMAGE_BASE }}/frontend:latest
          docker push ${{ env.IMAGE_BASE }}/frontend:latest

  deploy:
    needs: push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CLUSTER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/app
            docker-compose pull
            docker-compose down
            docker-compose up -d