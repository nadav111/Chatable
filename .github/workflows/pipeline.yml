name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  BACKEND_TAG: ghcr.io/nadav111/chatable/backend:${{ github.sha }}
  FRONTEND_TAG: ghcr.io/nadav111/chatable/frontend:${{ github.sha }}
  SOCKET_TAG: ghcr.io/nadav111/chatable/socket:${{ github.sha }}

jobs:
  push:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push backend
        run: |
          docker build -t $BACKEND_TAG ./backend
          docker push $BACKEND_TAG

      - name: Build & push frontend
        run: |
          docker build -t $FRONTEND_TAG ./frontend
          docker push $FRONTEND_TAG

      - name: Build & push socket
        run: |
          docker build -t $SOCKET_TAG ./socket-server
          docker push $SOCKET_TAG

  deploy:
    needs: push
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean old manifests
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CLUSTER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: rm -rf /opt/app/deployment

      - name: Copy manifests to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CLUSTER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: deployment/
          target: /opt/app

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CLUSTER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/app/deployment

            kubectl apply -f redis/
            kubectl apply -f backend/
            kubectl apply -f frontend/

            kubectl set image deployment/backend-deployment backend=${{ env.BACKEND_TAG }}
            kubectl set image deployment/frontend-deployment frontend=${{ env.FRONTEND_TAG }}
            kubectl set image deployment/socket-deployment socket=${{ env.SOCKET_TAG }}

            kubectl rollout status deployment/backend-deployment --timeout=120s
            kubectl rollout status deployment/frontend-deployment --timeout=120s
            kubectl rollout status deployment/socket-deployment --timeout=120s