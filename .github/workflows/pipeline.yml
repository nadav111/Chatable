name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_BASE: ghcr.io/nadav111/chatable

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      backend_tag: ${{ steps.meta.outputs.backend_tag }}
      frontend_tag: ${{ steps.meta.outputs.frontend_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tags
        id: meta
        run: |
          echo "backend_tag=${{ env.IMAGE_BASE }}/backend:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "frontend_tag=${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Save tags as artifacts
        run: |
          echo "${{ steps.meta.outputs.backend_tag }}" > backend.txt
          echo "${{ steps.meta.outputs.frontend_tag }}" > frontend.txt

      - name: Upload backend tag
        uses: actions/upload-artifact@v4
        with:
          name: backend-tag
          path: backend.txt
          retention-days: 1

      - name: Upload frontend tag
        uses: actions/upload-artifact@v4
        with:
          name: frontend-tag
          path: frontend.txt
          retention-days: 1

  push:
    needs: build
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend tag
        uses: actions/download-artifact@v4
        with:
          name: backend-tag

      - name: Download frontend tag
        uses: actions/download-artifact@v4
        with:
          name: frontend-tag

      - name: Read tags
        id: tags
        run: |
          echo "BACKEND_TAG=$(cat backend.txt)" >> $GITHUB_ENV
          echo "FRONTEND_TAG=$(cat frontend.txt)" >> $GITHUB_ENV

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push backend
        run: |
          docker build -t $BACKEND_TAG ./backend
          docker push $BACKEND_TAG

      - name: Build & push frontend
        run: |
          docker build -t $FRONTEND_TAG ./frontend
          docker push $FRONTEND_TAG

  deploy:
    needs: push
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend tag
        uses: actions/download-artifact@v4
        with:
          name: backend-tag

      - name: Download frontend tag
        uses: actions/download-artifact@v4
        with:
          name: frontend-tag

      - name: Read tags
        run: |
          echo "BACKEND_TAG=$(cat backend.txt)" >> $GITHUB_ENV
          echo "FRONTEND_TAG=$(cat frontend.txt)" >> $GITHUB_ENV

      - name: Copy manifests to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CLUSTER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: deployment/
          target: /opt/app

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CLUSTER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/app/deployment

            kubectl set image deployment/backend-deployment backend=$BACKEND_TAG
            kubectl set image deployment/frontend-deployment frontend=$FRONTEND_TAG

            kubectl apply -f redis/
            kubectl apply -f backend/
            kubectl apply -f frontend/

            kubectl rollout status deployment/backend-deployment
            kubectl rollout status deployment/frontend-deployment