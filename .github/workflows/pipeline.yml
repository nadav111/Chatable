name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_BASE: ghcr.io/nadav111/chatable

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t backend:latest ./backend
          docker save backend:latest | gzip > backend.tar.gz

      - name: Build frontend image
        run: |
          docker build -t frontend:latest ./frontend
          docker save frontend:latest | gzip > frontend.tar.gz

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend.tar.gz

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend.tar.gz

  push:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend image
        uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Download frontend image
        uses: actions/download-artifact@v4
        with:
          name: frontend-image

      - name: Load backend image
        run: gunzip -c backend.tar.gz | docker load

      - name: Load frontend image
        run: gunzip -c frontend.tar.gz | docker load

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Tag & push backend
        run: |
          docker tag backend:latest ${{ env.IMAGE_BASE }}/backend:latest
          docker push ${{ env.IMAGE_BASE }}/backend:latest

      - name: Tag & push frontend
        run: |
          docker tag frontend:latest ${{ env.IMAGE_BASE }}/frontend:latest
          docker push ${{ env.IMAGE_BASE }}/frontend:latest

  deploy:
    needs: push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CLUSTER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/app
            docker-compose pull
            docker-compose down
            docker-compose up -d