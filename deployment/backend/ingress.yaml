apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
spec:
  rules:
  - host: chatable.local
    http:
      paths:
      - path: /chats
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 3000
      - path: /home
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 3000
      - path: /messages
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 3000